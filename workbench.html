<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>肾移植随访系统 · 患者管理工作台</title>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#f5f7fa;
      --panel:#ffffff;
      --panel2:#f7f9fc;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e2e8f0;
      --shadow:0 10px 30px rgba(0,0,0,.06);
      --blue:#1677ff;
      --cyan:#06b6d4;
      --red:#ef4444;
      --green:#16a34a;
      --yellow:#f59e0b;
      --orange:#f97316;
      --radius:12px;
      --fz-title:16px;
      --fz-label:14px;
      --fz-desc:12px;
    }
    html,body{height:100%}
    body{font-family:system-ui,-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

    .app{display:grid;grid-template-columns:276px 1fr;grid-template-rows:56px 1fr;height:100%}
    .sidebar{grid-row:1/3;background:linear-gradient(180deg,#ffffff 0%, #f5f7fa 100%);border-right:1px solid rgba(148,163,184,.22);display:flex;flex-direction:column;min-width:0}
    .brand{height:48px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid rgba(148,163,184,.25)}
    .brand .logo{width:28px;height:28px;border-radius:9px;background:var(--blue);box-shadow:none}
    .brand .t{min-width:0}
    .brand .t .h{font-size:14px;font-weight:800;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand .t .s{display:none}

    .nav{padding:10px 10px 14px;overflow:auto}
    .nav::-webkit-scrollbar{width:6px}
    .nav::-webkit-scrollbar-thumb{background:rgba(148,163,184,.45);border-radius:8px}
    .nav-group{margin-bottom:10px}
    .nav-group__head{
      display:flex;align-items:center;gap:8px;
      padding:10px 10px;border-radius:10px;
      font-size:13px;font-weight:900;color:#0b1220;
      cursor:pointer;user-select:none;
      background:transparent;
      border:1px solid transparent;
    }
    .nav-group__head iconify-icon{font-size:18px;color:rgba(22,119,255,.85)}
    .nav-group__head .chev{margin-left:auto;color:#94a3b8;font-weight:900;transition:transform .2s ease}
    .nav-group[data-open="1"] .nav-group__head .chev{transform:rotate(180deg)}

    /* 子菜单：卡片容器 + 展开动画 */
    .nav-group__items{
      margin-top:8px;
      background:rgba(255,255,255,.70);
      border:1px solid rgba(148,163,184,.22);
      border-radius:12px;
      padding:8px 8px;
      height:0;
      overflow:hidden;
      opacity:0;
      transform:translateY(-6px);
      transition:opacity .25s ease, transform .25s ease;
      pointer-events:none;
    }
    .nav-group[data-open="1"] .nav-group__items{
      opacity:1;
      transform:translateY(0);
      pointer-events:auto;
    }
    .nav-item{
      position:relative;
      display:flex;align-items:center;gap:8px;
      padding:8px 10px;border-radius:10px;
      font-size:13px;color:#1f2937;font-weight:700;
      cursor:pointer;user-select:none;
      transition:transform .2s ease, background-color .2s ease, color .2s ease;
      will-change:transform;
    }
    .nav-item:hover{background:rgba(22,119,255,.08)}
    .nav-item:hover{transform:translateX(4px)}
    .nav-item[data-active="1"]{background:rgba(22,119,255,.12);color:#0b1b40;font-weight:700}
    .nav-item[data-active="1"] .i{color:var(--blue)}
    .nav-item[data-active="1"]::after{
      content:"";
      position:absolute;
      left:6px;
      top:6px;
      bottom:6px;
      width:3px;
      border-radius:999px;
      background:rgba(22,119,255,.85);
    }
    .nav-item .i{width:20px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted)}
    .nav-item iconify-icon{font-size:18px}

    /* 层级缩进（一级/二级/三级） */
    .nav-l1{padding-left:10px}
    .nav-l2{padding-left:24px}
    .nav-l3{padding-left:36px}
    .nav-l2 iconify-icon,.nav-l3 iconify-icon{font-size:16px}

    /* 引导线与节点（树结构路径） */
    .nav-sub{
      position:relative;
    }
    .nav-sub::before{
      content:"";
      position:absolute;
      left:14px;
      top:6px;
      bottom:6px;
      width:2px;
      background:rgba(148,163,184,.35);
      border-radius:2px;
    }
    .nav-sub::after{
      content:"";
      position:absolute;
      left:14px;
      top:50%;
      width:10px;
      height:2px;
      background:rgba(148,163,184,.35);
      transform:translateY(-50%);
      border-radius:2px;
    }
    .nav-sub .i{
      position:relative;
      z-index:1;
    }
    .nav-sub .i::before{
      content:"";
      position:absolute;
      left:-10px;
      top:50%;
      width:6px;
      height:6px;
      border-radius:50%;
      background:#fff;
      border:2px solid rgba(22,119,255,.30);
      transform:translateY(-50%);
    }

    .topbar{background:var(--panel);border-bottom:1px solid rgba(148,163,184,.25);display:flex;align-items:center;gap:12px;padding:0 16px}
    .topbar-left{display:flex;flex-direction:column;gap:2px;min-width:0}
    .topbar-title{display:flex;align-items:baseline;gap:10px;min-width:0}
    .topbar-title h1{font-size:20px;font-weight:700;letter-spacing:.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .crumb{font-size:12px;color:var(--muted);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .topbar-mid{flex:1;display:flex;justify-content:center}
    .gsearch{
      width:min(640px, 100%);
      display:flex;align-items:center;gap:8px;
      background:#fff;border:1px solid rgba(148,163,184,.35);
      border-radius:999px;
      padding:8px 12px;
    }
    .gsearch iconify-icon{color:rgba(100,116,139,.9);font-size:18px}
    .gsearch input{border:none;outline:none;background:transparent;width:100%;font-size:14px}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .iconbtn{border:1px solid rgba(148,163,184,.35);background:#fff;border-radius:10px;padding:8px 10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
    .iconbtn iconify-icon{font-size:18px;color:#334155}
    .userpill{display:flex;align-items:center;gap:8px;border:1px solid rgba(148,163,184,.35);background:#fff;border-radius:999px;padding:7px 10px;font-size:12px;color:#334155;font-weight:600}
    .userpill iconify-icon{font-size:18px;color:#334155}
    .clock{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;color:var(--muted)}

    .main{min-height:0;overflow:hidden;display:flex;flex-direction:column}
    .page{flex:1;min-height:0;overflow:auto;padding:16px 16px 18px}
    .page::-webkit-scrollbar{width:8px}
    .page::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}

    .toolbar{
      display:flex;align-items:center;gap:10px;flex-wrap:wrap;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px 16px;
      box-shadow:var(--shadow);
    }
    .toolbar .seg{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .field{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:8px 10px}
    .field label{font-size:12px;color:var(--muted);font-weight:800}
    .field input,.field select{border:none;background:transparent;outline:none;font-size:13px;min-width:160px}
    .chipset{display:flex;gap:6px;align-items:center}
    .chip{
      border:1px solid var(--border);
      background:var(--panel2);
      padding:6px 10px;border-radius:999px;
      font-size:12px;font-weight:800;color:#0b1220;
      cursor:pointer;user-select:none;
    }
    .chip[data-on="1"]{border-color:rgba(37,99,235,.35);background:rgba(37,99,235,.10);color:#0b1b40}
    .btn{
      border:1px solid var(--border);
      background:var(--panel);
      padding:9px 12px;border-radius:10px;
      font-size:13px;font-weight:900;
      cursor:pointer;user-select:none;
      display:inline-flex;align-items:center;gap:8px;
    }
    .btn iconify-icon{font-size:16px}
    .btn:hover{border-color:#cbd5e1}
    .btn.primary{background:var(--blue);border-color:rgba(22,119,255,.35);color:#fff}
    .btn.primary:hover{filter:brightness(1.02)}
    .btn.primary:hover{filter:brightness(1.02)}
    .btn.danger{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.06);color:#991b1b}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    .layout70{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:16px;margin-top:16px;min-height:0}
    .card{background:var(--panel);border:none;border-radius:14px;box-shadow:var(--shadow);min-width:0}
    .card-h{padding:14px 16px;border-bottom:1px solid rgba(148,163,184,.25);display:flex;align-items:center;justify-content:space-between;gap:10px}
    .card-h .t{font-size:16px;font-weight:700}
    .card-h .s{font-size:var(--fz-desc);color:var(--muted);font-weight:750}
    .card-b{padding:16px 16px;min-height:0}

    table{width:100%;border-collapse:separate;border-spacing:0}
    thead th{
      text-align:left;
      font-size:14px;color:#334155;font-weight:600;
      padding:10px 10px;border-bottom:1px solid var(--border);
      background:#f3f4f6;
      position:sticky;top:0;z-index:2;
    }
    tbody td{padding:10px 10px;border-bottom:1px solid rgba(148,163,184,.28);font-size:14px;font-weight:500;color:#0b1220;vertical-align:middle}
    tbody tr{cursor:pointer}
    tbody tr:hover{background:rgba(22,119,255,.045)}
    tbody tr[data-selected="1"]{background:rgba(22,119,255,.12)}
    .muted{color:var(--muted);font-weight:750}
    .tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid var(--border);background:var(--panel2)}
    .tag.red{border-color:rgba(239,68,68,.22);background:rgba(239,68,68,.08);color:#b91c1c}
    .tag.yellow{border-color:rgba(245,158,11,.22);background:rgba(245,158,11,.10);color:#92400e}
    .tag.green{border-color:rgba(22,163,74,.22);background:rgba(22,163,74,.10);color:#166534}
    .tag.blue{border-color:rgba(22,119,255,.22);background:rgba(22,119,255,.08);color:#0b1b40}
    .tag.cyan{border-color:rgba(6,182,212,.22);background:rgba(6,182,212,.08);color:#0b2a33}
    .tag.gray{border-color:rgba(100,116,139,.18);background:rgba(100,116,139,.08);color:#334155}
    .risk-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;color:#0b1220;background:#fff;border:1px solid rgba(148,163,184,.28)}
    .risk-pill.high{background:rgba(239,68,68,.10);border-color:rgba(239,68,68,.22);color:#b91c1c}
    .risk-pill.mid{background:rgba(249,115,22,.12);border-color:rgba(249,115,22,.22);color:#9a3412}
    .risk-pill.low{background:rgba(22,163,74,.12);border-color:rgba(22,163,74,.22);color:#166534}

    /* 顶部患者信息卡 */
    .patient-hero{display:flex;align-items:stretch;justify-content:space-between;gap:14px;padding:16px 16px}
    .patient-hero__left{display:flex;flex-direction:column;gap:10px;min-width:0}
    .patient-hero__name{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
    .patient-hero__name .n{font-size:18px;font-weight:800;color:#0b1220}
    .patient-hero__meta{font-size:13px;color:var(--muted);font-weight:400}
    .patient-hero__meta b{color:#0b1220;font-weight:600}
    .patient-hero__badges{display:flex;gap:8px;flex-wrap:wrap}
    .patient-hero__right{margin-left:auto;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;justify-content:flex-end}
    .metric{min-width:140px;padding:10px 12px;border-radius:12px;background:rgba(22,119,255,.04);border:1px solid rgba(22,119,255,.14)}
    .metric .k{font-size:12px;color:var(--muted);font-weight:400}
    .metric .v{margin-top:4px;font-size:22px;font-weight:800;color:#0b1220}
    .metric .u{font-size:12px;color:var(--muted);font-weight:400;margin-left:6px}
    .metric .s{margin-top:4px;font-size:12px;color:var(--muted);font-weight:400}

    /* 右侧操作区 */
    .ops{display:flex;flex-direction:column;gap:12px}
    .ops .hint{font-size:12px;color:var(--muted);font-weight:750;line-height:1.4}
    .ops .stack{display:flex;flex-direction:column;gap:8px}
    .ops .kv{display:flex;justify-content:space-between;gap:10px;font-size:12px;color:var(--muted);font-weight:750}
    .ops .kv b{color:#0b1220}
    .ops-card{border:1px solid var(--border);border-radius:12px;background:#fff;padding:10px 10px}
    .ops-card__h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .ops-card__h .t{font-size:14px;font-weight:900;color:#0b1220}
    .ops-card__h .s{font-size:12px;color:var(--muted);font-weight:750}
    .ops-row{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px;color:var(--muted);font-weight:750;padding:6px 0;border-top:1px dashed rgba(148,163,184,.35)}
    .ops-row:first-of-type{border-top:none;padding-top:0}
    .ops-row b{color:#0b1220}
    .ops-badges{display:flex;gap:8px;flex-wrap:wrap}
    .ops-list{display:flex;flex-direction:column;gap:6px}
    .ops-item{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:#0b1220;line-height:1.35}
    .ops-item .dot{margin-top:5px;width:6px;height:6px;border-radius:50%;background:rgba(22,119,255,.55);flex:0 0 auto}
    .ops-item .t{font-weight:850}
    .ops-item .m{color:var(--muted);font-weight:750}
    .btn-group{display:flex;flex-direction:column;gap:8px}
    .btn-split{height:1px;background:rgba(148,163,184,.35);margin:2px 0}
    .ops-timeline{position:relative;margin-top:6px;padding-left:14px}
    .ops-timeline::before{content:"";position:absolute;left:4px;top:4px;bottom:4px;width:2px;background:rgba(148,163,184,.28);border-radius:2px}
    .ops-tl-item{position:relative;padding:6px 0 6px 0}
    .ops-tl-item::before{content:"";position:absolute;left:-12px;top:12px;width:8px;height:8px;border-radius:999px;background:#fff;border:2px solid rgba(22,119,255,.45)}
    .ops-tl-item .h{font-size:12px;font-weight:850;color:#0b1220}
    .ops-tl-item .d{margin-top:2px;font-size:12px;color:var(--muted);font-weight:750;line-height:1.35}

    /* 抽屉 */
    .drawer-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.28);display:none;z-index:50}
    .drawer{position:fixed;top:0;right:0;height:100%;width:520px;max-width:92vw;background:var(--panel);border-left:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.22);transform:translateX(110%);transition:transform .25s ease;z-index:60;display:flex;flex-direction:column;min-width:0}
    .drawer[data-open="1"]{transform:translateX(0)}
    .drawer-backdrop[data-open="1"]{display:block}
    .drawer-h{padding:16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .drawer-h .ttl{min-width:0}
    .drawer-h .ttl .h{font-size:16px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .drawer-h .ttl .m{font-size:12px;color:var(--muted);margin-top:4px}
    .drawer-h .x{border:1px solid var(--border);background:var(--panel2);border-radius:10px;padding:8px 10px;font-size:12px;font-weight:900;cursor:pointer}
    .drawer-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--border)}
    .drawer-tab{padding:7px 10px;border-radius:999px;border:1px solid var(--border);background:var(--panel2);font-size:12px;font-weight:900;color:#0b1220;cursor:pointer}
    .drawer-tab[data-on="1"]{background:rgba(37,99,235,.10);border-color:rgba(37,99,235,.22);color:#0b1b40}
    .drawer-b{padding:16px 16px;overflow:auto;min-height:0}
    .drawer-b::-webkit-scrollbar{width:8px}
    .drawer-b::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}

    .form{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}
    .form .full{grid-column:1/-1}
    .ctrl{display:flex;flex-direction:column;gap:6px}
    .ctrl .l{font-size:12px;color:var(--muted);font-weight:900}
    .ctrl input,.ctrl select,.ctrl textarea{
      border:1px solid var(--border);
      background:#fff;
      border-radius:10px;
      padding:9px 10px;
      font-size:13px;
      outline:none;
    }
    .ctrl textarea{min-height:72px;resize:vertical}
    .err{font-size:12px;color:var(--red);font-weight:800;margin-top:2px;display:none}
    .ctrl[data-err="1"] .err{display:block}
    .ctrl[data-err="1"] input,.ctrl[data-err="1"] select,.ctrl[data-err="1"] textarea{border-color:rgba(239,68,68,.6);background:rgba(239,68,68,.03)}

    .section{border:1px solid var(--border);border-radius:12px;background:var(--panel2);padding:10px 10px}
    .section-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
    .section-h .t{font-size:13px;font-weight:950}
    .section-h .s{font-size:12px;color:var(--muted)}
    .list{display:flex;flex-direction:column;gap:8px}
    .item{background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px 10px}
    .item .r1{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .item .r1 .k{font-size:13px;font-weight:950}
    .item .r1 .t{font-size:12px;color:var(--muted);font-weight:750}
    .item .r2{margin-top:6px;font-size:12px;color:#0b1220;line-height:1.45}

    /* 占位页面 */
    .empty{
      background:var(--panel);
      border:1px dashed #cbd5e1;
      border-radius:var(--radius);
      padding:28px 18px;
      box-shadow:var(--shadow);
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }
    .empty b{color:#0b1220}

    @media (max-width:1100px){
      .app{grid-template-columns:1fr}
      .sidebar{display:none}
      .layout70{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div class="t">
          <div class="h">患者管理工作台</div>
          <div class="s">录入 · 查询 · 编辑 · 补录</div>
        </div>
      </div>
      <nav class="nav" id="nav"></nav>
    </aside>

    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">
          <h1 id="pageTitle">患者列表</h1>
        </div>
        <div class="crumb" id="breadcrumb">工作台 / 患者管理 / 患者列表</div>
      </div>
      <div class="topbar-mid">
        <div class="gsearch" role="search">
          <iconify-icon icon="mdi:magnify"></iconify-icon>
          <input id="globalSearch" placeholder="全局搜索：姓名 / 患者ID / 关键词" autocomplete="off" />
        </div>
      </div>
      <div class="topbar-right">
        <button class="iconbtn" id="btnNotify" title="通知"><iconify-icon icon="mdi:bell-outline"></iconify-icon></button>
        <div class="userpill" title="当前用户">
          <iconify-icon icon="mdi:account-circle-outline"></iconify-icon>
          <span id="userName">医生</span>
        </div>
        <span class="clock" id="clock">—</span>
      </div>
    </header>

    <main class="main">
      <div class="page" id="page">
        <!-- 内容由 JS 渲染 -->
      </div>
    </main>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-h">
      <div class="ttl">
        <div class="h" id="drawerTitle">患者详情</div>
        <div class="m" id="drawerMeta">—</div>
      </div>
      <button class="x" id="drawerClose">关闭</button>
    </div>
    <div class="drawer-tabs" id="drawerTabs"></div>
    <div class="drawer-b" id="drawerBody"></div>
  </aside>

  <script>
    // =========================
    // 简易数据层（localStorage）
    // =========================
    const LS_KEY = "renal_workbench_v1";
    const CURRENT_USER = "本机用户";
    function nowIso(){ return new Date().toISOString(); }
    function loadState(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        if(!raw) return null;
        return JSON.parse(raw);

      root.querySelectorAll(".nav-group").forEach((sec) => {
        const items = sec.querySelector(".nav-group__items");
        if(!items) return;
        if(sec.dataset.open === "1"){
          items.style.height = "auto";
          items.style.opacity = "1";
          items.style.transform = "translateY(0)";
          items.style.pointerEvents = "auto";
        }else{
          items.style.height = "0px";
        }
      });

      function animateGroup(sec, open){
        const items = sec.querySelector(".nav-group__items");
        if(!items) return;
        items.getAnimations().forEach((a)=>a.cancel());

        if(open){
          sec.dataset.open = "1";
          // 先设为 0，测量目标高度
          items.style.pointerEvents = "auto";
          items.style.opacity = "1";
          items.style.transform = "translateY(0)";
          items.style.height = "auto";
          const target = items.scrollHeight;
          items.style.height = "0px";
          items.style.opacity = "0";
          items.style.transform = "translateY(-6px)";
          const anim = items.animate(
            [
              { height:"0px", opacity:0, transform:"translateY(-6px)" },
              { height: `${target}px`, opacity:1, transform:"translateY(0)" }
            ],
            { duration: 280, easing: "cubic-bezier(.2,.8,.2,1)" }
          );
          anim.onfinish = ()=>{
            items.style.height = "auto";
            items.style.opacity = "1";
            items.style.transform = "translateY(0)";
            items.style.pointerEvents = "auto";
          };
        }else{
          // 从当前高度收起到 0
          const cur = items.getBoundingClientRect().height;
          const anim = items.animate(
            [
              { height:`${cur}px`, opacity:1, transform:"translateY(0)" },
              { height:"0px", opacity:0, transform:"translateY(-6px)" }
            ],
            { duration: 220, easing: "cubic-bezier(.4,0,.2,1)" }

            items.style.height = "0px";
            items.style.opacity = "0";
            items.style.transform = "translateY(-6px)";
            items.style.pointerEvents = "none";
          };
        }

    function byUpdatedDesc(a,b){ return String(b.updatedAt||"").localeCompare(String(a.updatedAt||"")); }

    function latestLab(p){
      const labs = p?.records?.labs || [];
      if(!labs.length) return null;
      const last = labs[labs.length - 1];
      return last || null;
    }
    function prevLab(p){
      const labs = p?.records?.labs || [];
      if(labs.length < 2) return null;
      return labs[labs.length - 2] || null;
    }
    function statusTag(p){
      const abn = !!(p && p.flags && p.flags.abnormal);
      const last = latestLab(p);
      const scr = last && Number.isFinite(Number(last.scr)) ? Number(last.scr) : null;
      const egfr = last && Number.isFinite(Number(last.egfr)) ? Number(last.egfr) : null;
      if(abn || (scr != null && scr >= 134) || (egfr != null && egfr < 45)) return `<span class="tag red">异常</span>`;
      if((scr != null && scr >= 115) || (egfr != null && egfr < 60)) return `<span class="tag yellow">关注</span>`;
      return `<span class="tag green">正常</span>`;
    }
    function riskHint(p){
      const t = statusTag(p);
      if(t.includes("异常")) return { lvl:"高", cls:"tag red" };
      if(t.includes("关注")) return { lvl:"中", cls:"tag yellow" };
      return { lvl:"低", cls:"tag green" };
    }
    function fmtTs(s){
      if(!s) return "—";
      return String(s).slice(0,19).replace("T"," ");
    }
    function recentAbnormalItems(p){
      const items = [];
      const last = latestLab(p);
      const prev = prevLab(p);
      if(last){
        const scr = Number.isFinite(Number(last.scr)) ? Number(last.scr) : null;
        const egfr = Number.isFinite(Number(last.egfr)) ? Number(last.egfr) : null;
        const tac = Number.isFinite(Number(last.tac)) ? Number(last.tac) : null;
        const prot = Number.isFinite(Number(last.prot)) ? Number(last.prot) : null;
        const scrPrev = prev && Number.isFinite(Number(prev.scr)) ? Number(prev.scr) : null;
        const egfrPrev = prev && Number.isFinite(Number(prev.egfr)) ? Number(prev.egfr) : null;
        const tacPrev = prev && Number.isFinite(Number(prev.tac)) ? Number(prev.tac) : null;

        if(scr != null){
          if(scrPrev != null && scr - scrPrev >= 10) items.push({ k:"Scr升高", m:`${scrPrev} → ${scr}` });
          else if(scr >= 134) items.push({ k:"Scr偏高", m:`${scr}` });
        }
        if(egfr != null){
          if(egfrPrev != null && egfrPrev - egfr >= 8) items.push({ k:"eGFR下降", m:`${egfrPrev} → ${egfr}` });
          else if(egfr < 45) items.push({ k:"eGFR偏低", m:`${egfr}` });
        }
        if(tac != null){
          if(tacPrev != null && tacPrev - tac >= 1.2) items.push({ k:"Tac下降", m:`${tacPrev} → ${tac}` });
          else if(tac < 5.0) items.push({ k:"Tac偏低", m:`${tac}` });
        }
        if(prot != null && prot >= 10) items.push({ k:"蛋白尿升高", m:`${prot}%` });
      }
      if(p?.flags?.abnormal && !items.length) items.push({ k:"存在异常标记", m:"请查看详情确认原因" });
      return items.slice(0, 4);
    }

    // =========================

    const DRAWER_TABS = [
      { k:"basic", t:"基本信息" },
      { k:"preop", t:"术前评估" },
      { k:"intraop", t:"术中记录" },
      { k:"postop", t:"术后随访" },
      { k:"meds", t:"用药管理" },
      { k:"monitor", t:"指标监测" },
      { k:"risk", t:"风险预警" },
      { k:"plan", t:"随访计划" }
    ];

    function openDrawerForSelected(tabKey="basic"){
      const p = state.patients.find((x)=>x.id===selectedId);
      if(!p) return;
      route.drawerOpen = true;
      route.drawerTab = tabKey || "basic";
      renderDrawer(p);
      document.getElementById("drawer").dataset.open = "1";
      document.getElementById("drawerBackdrop").dataset.open = "1";
    }
    function closeDrawer(){
      route.drawerOpen = false;
      document.getElementById("drawer").dataset.open = "0";
      document.getElementById("drawerBackdrop").dataset.open = "0";
    }
    function renderDrawer(p){
      document.getElementById("drawerTitle").textContent = `${p.name} · ${p.id}`;
      document.getElementById("drawerMeta").textContent = `${p.sex||"—"} · ${Number.isFinite(p.age)?p.age:"—"}岁 · ${p.status||"—"} · 手术 ${fmtDate(p.surgeryDate)}`;

      const tabsEl = document.getElementById("drawerTabs");
      tabsEl.innerHTML = DRAWER_TABS.map((x)=>`<div class="drawer-tab" data-k="${x.k}" data-on="${x.k===route.drawerTab?1:0}">${x.t}</div>`).join("");
      tabsEl.onclick = (e)=>{
        const t = e.target.closest(".drawer-tab");
        if(!t) return;
        route.drawerTab = t.dataset.k;
        renderDrawer(p);
      };

      document.getElementById("drawerBody").innerHTML = drawerTabHtml(p, route.drawerTab);
      hookDrawerTabHandlers(p);
    }

    function drawerTabHtml(p, tab){
      if(tab==="basic"){
        return `
          <div class="section">
            <div class="section-h">
              <div class="t">基本信息</div>
              <div class="s">可在“编辑患者”中修改</div>
            </div>
            <div class="kv"><span>姓名</span><b>${escapeHtml(p.name)}</b></div>
            <div class="kv"><span>性别/年龄</span><b>${escapeHtml(p.sex||"—")} · ${Number.isFinite(p.age)?p.age:"—"}岁</b></div>
            <div class="kv"><span>患者ID</span><b>${escapeHtml(p.id)}</b></div>
            <div class="kv"><span>状态</span><b>${escapeHtml(p.status||"—")}</b></div>
            <div class="kv"><span>手术时间</span><b>${escapeHtml(fmtDate(p.surgeryDate))}</b></div>
            <div class="kv"><span>供体信息</span><b>${escapeHtml(p.donorInfo||"—")}</b></div>
            <div class="kv"><span>联系方式</span><b>${escapeHtml(p.phone||"—")}</b></div>
            <div class="kv"><span>异常标记</span><b>${p.flags?.abnormal ? "是" : "否"}</b></div>
          </div>
        `;
      }
      if(tab==="preop") return notesEditorHtml("术前评估", "preop", p.notes?.preop || "");
      if(tab==="intraop") return notesEditorHtml("术中记录", "intraop", p.notes?.intraop || "");
      if(tab==="postop") return notesEditorHtml("术后随访", "postop", p.notes?.postop || "");
      if(tab==="risk") return notesEditorHtml("风险预警", "risk", p.notes?.risk || "");
      if(tab==="plan") return notesEditorHtml("随访计划（个性化）", "plan", p.notes?.plan || "");

      if(tab==="monitor"){
        const labs = p.records?.labs || [];
        return `
          <div class="section">
            <div class="section-h">
              <div class="t">检验指标</div>
              <div class="s">Scr / Tac / eGFR / 蛋白尿</div>
              <button class="btn primary" id="btnAddLab">新增一条</button>
            </div>
            <div class="list">
              ${labs.length ? labs.slice().reverse().map((r)=>recordCard("检验", r.ts, `Scr ${val(r.scr)} · eGFR ${val(r.egfr)} · Tac ${val(r.tac)} · 蛋白 ${val(r.prot)}%`)).join("") : `<div class="muted">暂无记录</div>`}
            </div>
          </div>
          <div class="section" style="margin-top:10px">
            <div class="section-h">
              <div class="t">生命体征</div>
              <div class="s">体温 / 血压 / 体重</div>
              <button class="btn primary" id="btnAddVital">新增一条</button>
            </div>
            <div class="list">
              ${(p.records?.vitals||[]).length ? (p.records.vitals.slice().reverse().map((r)=>recordCard("体征", r.ts, `体温 ${val(r.temp)}℃ · 血压 ${val(r.sbp)}/${val(r.dbp)} · 体重 ${val(r.weight)}kg`)).join("")) : `<div class="muted">暂无记录</div>`}
            </div>
          </div>
        `;
      }

      if(tab==="meds"){
        const meds = p.records?.meds || [];
        return `
          <div class="section">
            <div class="section-h">
              <div class="t">用药记录</div>
              <div class="s">名称 / 剂量 / 频次</div>
              <button class="btn primary" id="btnAddMed">新增一条</button>
            </div>
            <div class="list">
              ${meds.length ? meds.slice().reverse().map((r)=>recordCard("用药", r.ts, `${escapeHtml(r.name||"—")} · ${escapeHtml(r.dose||"—")} · ${escapeHtml(r.freq||"—")} ${r.note?`· ${escapeHtml(r.note)}`:""}`)).join("") : `<div class="muted">暂无记录</div>`}
            </div>
          </div>
        `;
      }
      return `<div class="empty">模块 <b>${escapeHtml(tab)}</b> 尚未实现详细功能，可在此基础上迭代。</div>`;
    }

    function notesEditorHtml(title, key, val0){
      return `
        <div class="section">
          <div class="section-h">
            <div class="t">${escapeHtml(title)}</div>
            <div class="s">支持编辑保存</div>
          </div>
          <div class="ctrl full" style="gap:8px">
            <div class="l">内容</div>
            <textarea id="noteText" data-k="${key}">${escapeHtml(val0)}</textarea>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-top:10px">
            <button class="btn primary" id="btnSaveNote">保存</button>
          </div>
        </div>
      `;
    }

    function recordCard(title, ts, body){
      return `
        <div class="item">
          <div class="r1">
            <div class="k">${escapeHtml(title)}</div>
            <div class="t">${escapeHtml(ts||"—")}</div>
          </div>
          <div class="r2">${escapeHtml(body)}</div>
        </div>
      `;
    }
    function val(v){ return (v==null||v==="") ? "—" : String(v); }

    function hookDrawerTabHandlers(p){
      const root = document.getElementById("drawerBody");
      const btnSaveNote = root.querySelector("#btnSaveNote");
      if(btnSaveNote){
        btnSaveNote.onclick = ()=>{
          const ta = root.querySelector("#noteText");
          const k = ta.dataset.k;
          p.notes = p.notes || {};
          p.notes[k] = ta.value || "";
          p.updatedAt = nowIso();
          p.updatedBy = CURRENT_USER;
          audit(`更新 ${p.id} · ${k}`);
          persist();
          renderDrawer(p);
          render();
        };
      }

      const addLab = root.querySelector("#btnAddLab");
      if(addLab){
        addLab.onclick = ()=>{
          const ts = prompt("日期（YYYY-MM-DD）", new Date().toISOString().slice(0,10));
          if(!ts) return;
          const scr = prompt("肌酐 Scr", "");
          const egfr = prompt("eGFR", "");
          const tac = prompt("Tac 谷浓度", "");
          const prot = prompt("蛋白尿（%）", "");
          p.records = p.records || { labs:[], vitals:[], meds:[] };
          p.records.labs = p.records.labs || [];
          p.records.labs.push({ ts, scr: numOr(scr), egfr: numOr(egfr), tac: numOr(tac), prot: numOr(prot) });
          p.updatedAt = nowIso();
          p.updatedBy = CURRENT_USER;
          p.flags = p.flags || {};
          if(numOr(scr) != null && numOr(scr) >= 115) p.flags.abnormal = true;
          audit(`补录检验 ${p.id} · ${ts}`);
          persist();
          renderDrawer(p);
          render();
        };
      }

      const addVital = root.querySelector("#btnAddVital");
      if(addVital){
        addVital.onclick = ()=>{
          const ts = prompt("日期（YYYY-MM-DD）", new Date().toISOString().slice(0,10));
          if(!ts) return;
          const temp = prompt("体温（℃）", "");
          const sbp = prompt("收缩压", "");
          const dbp = prompt("舒张压", "");
          const weight = prompt("体重（kg）", "");
          p.records = p.records || { labs:[], vitals:[], meds:[] };
          p.records.vitals = p.records.vitals || [];
          p.records.vitals.push({ ts, temp: numOr(temp), sbp: numOr(sbp), dbp: numOr(dbp), weight: numOr(weight) });
          p.updatedAt = nowIso();
          p.updatedBy = CURRENT_USER;
          audit(`补录体征 ${p.id} · ${ts}`);
          persist();
          renderDrawer(p);
          render();
        };
      }

      const addMed = root.querySelector("#btnAddMed");
      if(addMed){
        addMed.onclick = ()=>{
          const ts = prompt("日期（YYYY-MM-DD）", new Date().toISOString().slice(0,10));
          if(!ts) return;
          const name = prompt("药品名称", "");
          if(!name) return;
          const dose = prompt("剂量", "");
          const freq = prompt("频次", "");
          const note = prompt("备注（可选）", "") || "";
          p.records = p.records || { labs:[], vitals:[], meds:[] };
          p.records.meds = p.records.meds || [];
          p.records.meds.push({ ts, name, dose, freq, note });
          p.updatedAt = nowIso();
          p.updatedBy = CURRENT_USER;
          audit(`补录用药 ${p.id} · ${ts}`);
          persist();
          renderDrawer(p);
          render();
        };
      }
    }

    function numOr(s){
      if(s == null) return null;
      const t = String(s).trim();
      if(!t) return null;
      const n = Number(t);
      return Number.isFinite(n) ? n : null;
    }

    function audit(msg){
      state.audit = state.audit || [];
      state.audit.unshift({ ts: nowIso(), msg, by: CURRENT_USER });
      state.audit = state.audit.slice(0, 200);
    }
    function persist(){ saveState(state); }

    // =========================
    // 页面渲染入口
    // =========================
    function render(){
      setActiveNav();
      const page = document.getElementById("page");
      if(route.page === "patients.list") page.innerHTML = renderPatientsList();
      else if(route.page === "patients.new") page.innerHTML = renderPatientsNew();
      else page.innerHTML = `<div class="empty">模块 <b>${escapeHtml(route.page)}</b> 为占位页。你提供的菜单结构已建立，后续可按优先级逐步实现。</div>`;
      hookPageHandlers();
    }

    function hookPageHandlers(){
      if(route.page === "patients.list"){
        const q = document.getElementById("qInput");
        if(q) q.oninput = (e)=>{ ui.q = e.target.value; render(); };
        const st = document.getElementById("statusSel");
        if(st) st.onchange = (e)=>{ ui.status = e.target.value; render(); };
        const sort = document.getElementById("sortSel");
        if(sort) sort.onchange = (e)=>{ ui.sort = e.target.value; render(); };
        const abn = document.getElementById("abnChip");
        if(abn) abn.onclick = ()=>{ ui.abn = !ui.abn; render(); };

        const btnNew = document.getElementById("btnNew");
        if(btnNew) btnNew.onclick = ()=>navigate("patients.new");
        const btnEdit = document.getElementById("btnEdit");
        if(btnEdit) btnEdit.onclick = ()=>startEditSelected();
        const btnAppend = document.getElementById("btnAppend");
        if(btnAppend) btnAppend.onclick = ()=>openDrawerForSelected("monitor");

        document.querySelectorAll("tbody tr[data-id]").forEach((tr)=>{
          tr.onclick = ()=>{
            selectedId = tr.dataset.id;
            openDrawerForSelected("basic");
            render();
          };
        });

        const opsOpenDetail = document.getElementById("opsOpenDetail");
        if(opsOpenDetail) opsOpenDetail.onclick = ()=>openDrawerForSelected("basic");
        const opsEdit = document.getElementById("opsEdit");
        if(opsEdit) opsEdit.onclick = ()=>startEditSelected();
        const opsAppend = document.getElementById("opsAppend");
        if(opsAppend) opsAppend.onclick = ()=>openDrawerForSelected("monitor");
        const opsDelete = document.getElementById("opsDelete");
        if(opsDelete) opsDelete.onclick = ()=>deleteSelected();
      }

      if(route.page === "patients.new"){
        bindPatientForm({mode:"new"});
      }
    }

    // =========================
    // 顶部栏：全局搜索/通知
    // =========================
    (function hookTopbar(){
      const gs = document.getElementById("globalSearch");
      if(gs){
        gs.addEventListener("keydown", (e)=>{
          if(e.key !== "Enter") return;
          const q = (gs.value || "").trim();
          if(!q) return;
          ui.q = q;
          if(route.page !== "patients.list"){
            navigate("patients.list");
          }else{
            render();
          }
        });
      }
      const n = document.getElementById("btnNotify");
      if(n){
        n.onclick = ()=>alert("通知中心：占位（可接入消息/提醒）。");
      }
      const u = document.getElementById("userName");
      if(u) u.textContent = CURRENT_USER === "本机用户" ? "医生" : CURRENT_USER;
    })();

    function bindPatientForm({mode, patient}){
      const root = document.getElementById("patientForm");
      if(!root) return;
      const get = (f)=>{
        const c = root.querySelector(`.ctrl[data-f="${f}"]`);
        const el = c && c.querySelector("input,select,textarea");
        return { c, el, v: el ? el.value : "" };
      };
      const setErr = (f,on)=>{
        const c = root.querySelector(`.ctrl[data-f="${f}"]`);
        if(c) c.dataset.err = on ? "1" : "0";
      };

      const cancel = document.getElementById("btnCancelForm");
      if(cancel) cancel.onclick = ()=>navigate("patients.list");

      const save = document.getElementById("btnSaveForm");
      if(save) save.onclick = ()=>{
        const name = get("name").v.trim();
        const sex = get("sex").v.trim();
        const age = Number(get("age").v);
        const id = get("id").v.trim();
        const surgeryDate = get("surgeryDate").v.trim();
        const status = get("status").v.trim();
        const donorInfo = get("donorInfo").v.trim();
        const phone = get("phone").v.trim();
        const abn = get("abn").v === "1";

        let ok = true;
        setErr("name", !name); ok = ok && !!name;
        setErr("sex", !sex); ok = ok && !!sex;
        setErr("age", !(Number.isFinite(age) && age>0 && age<130)); ok = ok && (Number.isFinite(age) && age>0 && age<130);
        setErr("id", !id); ok = ok && !!id;
        setErr("surgeryDate", !surgeryDate); ok = ok && !!surgeryDate;
        setErr("donorInfo", !donorInfo); ok = ok && !!donorInfo;
        setErr("phone", !phone); ok = ok && !!phone;

        if(!ok) return;

        if(mode==="new"){
          if(state.patients.some((p)=>p.id===id)){
            alert("患者ID已存在，请更换。");
            setErr("id", true);
            return;
          }
          const p = {
            id, name, sex, age, surgeryDate, donorInfo, phone,
            status,
            flags:{ abnormal: abn },
            updatedAt: nowIso(),
            updatedBy: CURRENT_USER,
            records:{ labs:[], vitals:[], meds:[] },
            notes:{ preop:"", intraop:"", postop:"", risk:"", plan:"" }
          };
          state.patients.unshift(p);
          selectedId = id;
          audit(`新增患者 ${id}`);
          persist();
          navigate("patients.list");
          openDrawerForSelected("basic");
          render();
        }else{
          const p = state.patients.find((x)=>x.id===patient.id);
          if(!p) return;
          p.name=name;p.sex=sex;p.age=age;p.surgeryDate=surgeryDate;p.donorInfo=donorInfo;p.phone=phone;p.status=status;
          p.flags = p.flags || {}; p.flags.abnormal = abn;
          p.updatedAt = nowIso();
          p.updatedBy = CURRENT_USER;
          audit(`编辑患者 ${p.id}`);
          persist();
          navigate("patients.list");
          openDrawerForSelected("basic");
          render();
        }
      };
    }

    function startEditSelected(){
      const p = state.patients.find((x)=>x.id===selectedId);
      if(!p) return;
      document.getElementById("pageTitle").textContent = "编辑患者";
      document.getElementById("breadcrumb").textContent = buildBreadcrumb("patients.list", "编辑患者");
      document.getElementById("page").innerHTML = `
        <div class="card">
          <div class="card-h">
            <div>
              <div class="t">编辑患者</div>
              <div class="s">患者ID不可修改</div>
            </div>
          </div>
          <div class="card-b">
            ${patientFormHtml({mode:"edit", patient:p})}
          </div>
        </div>
      `;
      bindPatientForm({mode:"edit", patient:p});
    }

    function deleteSelected(){
      const p = state.patients.find((x)=>x.id===selectedId);
      if(!p) return;
      const ok = confirm(`确认删除患者：${p.name}（${p.id}）？此操作不可逆。`);
      if(!ok) return;
      state.patients = state.patients.filter((x)=>x.id!==selectedId);
      audit(`删除患者 ${p.id}`);
      persist();
      selectedId = state.patients[0]?.id || null;
      closeDrawer();
      render();
    }

    // =========================
    // 抽屉关闭
    // =========================
    document.getElementById("drawerClose").onclick = ()=>closeDrawer();
    document.getElementById("drawerBackdrop").onclick = ()=>closeDrawer();
    window.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeDrawer(); });

    // =========================
    // Clock
    // =========================
    function tick(){
      const d = new Date();
      const s = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
      document.getElementById("clock").textContent = s;
    }
    setInterval(tick, 1000); tick();

    // =========================
    // 安全转义
    // =========================
    function escapeHtml(s){
      return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
    }
    function escapeAttr(s){ return escapeHtml(s); }

    // init
    buildNav();
    route.page = "patients.list";
    setActiveNav();
    render();
  </script>
</body>
</html>
