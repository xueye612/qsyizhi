#
# server {
#     listen 8081;
#     server_name your-domain.com;
#     root /www/wwwroot/your-site;    # 改为实际根目录
#     index index.html;
#
#     # ---------- 关键：SPA 路由回落 ----------
#     location / {
#         try_files $uri $uri/ /index.html;
#     }
