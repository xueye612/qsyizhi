<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <title>肾移植随访（医生端演示）</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="login-gate" id="loginGate" aria-hidden="true">
      <div class="login-card">
        <div class="login-title">医生登录</div>
        <div class="login-sub">肾移植随访平台</div>
        <div class="field" style="margin-top:12px">
          <div class="label">工号/手机号</div>
          <input id="loginUser" type="text" placeholder="请输入工号或手机号" />
        </div>
        <div class="field">
          <div class="label">密码</div>
          <input id="loginPass" type="password" placeholder="请输入密码" />
        </div>
        <div style="height:8px"></div>
        <button class="btn btn--primary" id="loginSubmit">登录</button>
        <div class="login-hint" id="loginHint">演示账号：DR1001，密码任意非空</div>
      </div>
    </div>

    <div class="app" id="app">
      <header class="topbar">
        <div>
          <div class="topbar__title">肾移植随访管理</div>
          <div class="topbar__subtitle">医生端演示</div>
        </div>
        <div class="topbar__right">
          <span class="topbar__hint">下滑自动收起搜索栏</span>
        </div>
      </header>

      <div class="search-dock" id="searchDock">
        <div class="search-dock__box" role="search" aria-label="页面内搜索">
          <input id="quickSearchInput" class="search-dock__input" type="search" placeholder="搜索患者、等待配型、预警、供体（回车直达）" />
          <button class="search-dock__go" data-action="submit-quick-search" aria-label="执行搜索">搜索</button>
        </div>
      </div>

      <main class="pages" id="pages">
        <section class="page active" data-page="home" aria-label="首页"></section>
        <section class="page" data-page="patients" aria-label="患者"></section>
        <section class="page" data-page="alerts" aria-label="预警"></section>
        <section class="page" data-page="donors" aria-label="供体"></section>
        <section class="page" data-page="research" aria-label="科研"></section>
        <section class="page" data-page="analytics" aria-label="数据"></section>
        <section class="page" data-page="me" aria-label="我的"></section>
      </main>

      <nav class="tabs" aria-label="底部导航">
        <button class="tab active" data-nav="home" aria-current="page">
          <span class="tab__icon" aria-hidden="true">
            <svg class="tab-svg" viewBox="0 0 24 24" fill="none">
              <path d="M3 10.5L12 3l9 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.5 10.5V20a1.5 1.5 0 0 0 1.5 1.5h8A1.5 1.5 0 0 0 17.5 20v-9.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="tab__label">首页</span>
        </button>
        <button class="tab" data-nav="patients">
          <span class="tab__icon" aria-hidden="true">
            <svg class="tab-svg" viewBox="0 0 24 24" fill="none">
              <path d="M12 12a4.2 4.2 0 1 0-4.2-4.2A4.2 4.2 0 0 0 12 12Z" stroke="currentColor" stroke-width="2"/>
              <path d="M4.5 20a7.5 7.5 0 0 1 15 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="tab__label">患者</span>
        </button>
        <button class="tab" data-nav="alerts">
          <span class="tab__icon" aria-hidden="true">
            <svg class="tab-svg" viewBox="0 0 24 24" fill="none">
              <path d="M12 9v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M12 17h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <path d="M10.3 4.9 2.8 18a2 2 0 0 0 1.7 3h15a2 2 0 0 0 1.7-3L13.7 4.9a2 2 0 0 0-3.4 0Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="tab__label">预警</span>
        </button>
        <button class="tab" data-nav="me">
          <span class="tab__icon" aria-hidden="true">
            <svg class="tab-svg" viewBox="0 0 24 24" fill="none">
              <path d="M12 12a4.2 4.2 0 1 0-4.2-4.2A4.2 4.2 0 0 0 12 12Z" stroke="currentColor" stroke-width="2"/>
              <path d="M4.5 20a7.5 7.5 0 0 1 15 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M18.2 8.2h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="tab__label">我的</span>
        </button>
      </nav>
    </div>

    <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>

    <div class="sheet" id="sheet" aria-hidden="true">
      <div class="sheet__backdrop" data-close="sheet"></div>
      <div class="sheet__panel" id="sheetPanel"></div>
    </div>

    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal__backdrop" data-close="modal"></div>
      <div class="modal__panel" id="modalPanel"></div>
    </div>

    <div class="global-search" id="globalSearch" aria-hidden="true">
      <div class="global-search__backdrop" data-close="global-search"></div>
      <div class="global-search__panel">
        <div class="global-search__head">
          <input id="globalSearchInput" class="global-search__input" type="text" placeholder="搜索患者、配型状态、预警、供体..." />
          <button class="global-search__cancel" data-close="global-search">取消</button>
        </div>
        <div class="global-search__meta" id="globalSearchMeta">输入关键词开始搜索</div>
        <div class="global-search__section" id="globalSearchRecent"></div>
        <div class="global-search__section" id="globalSearchResults"></div>
      </div>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
