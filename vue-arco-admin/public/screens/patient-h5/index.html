<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <title>肾移植随访（患者端演示）</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="login-gate" id="loginGate" aria-hidden="true">
      <div class="login-card">
        <div class="login-title">患者登录</div>
        <div class="login-sub">肾移植随访平台</div>
        <div class="field" style="margin-top:12px">
          <div class="label">手机号</div>
          <input id="loginUser" type="text" placeholder="请输入手机号" />
        </div>
        <div class="field">
          <div class="label">密码</div>
          <input id="loginPass" type="password" placeholder="请输入密码" />
        </div>
        <div style="height:8px"></div>
        <button class="btn btn--primary" id="loginSubmit">登录</button>
        <div class="login-hint" id="loginHint">演示账号：13800000000，密码任意非空</div>
      </div>
    </div>

    <div class="app" id="app">
      <header class="topbar">
        <div>
          <div class="topbar__title">肾移植随访管理</div>
          <div class="topbar__subtitle">患者端演示</div>
        </div>
        <div class="topbar__right">
          <span class="topbar__hint">下滑自动收起搜索栏</span>
        </div>
      </header>

      <div class="search-dock" id="searchDock">
        <div class="search-dock__box" role="search" aria-label="页面内搜索">
          <input id="quickSearchInput" class="search-dock__input" type="search" placeholder="搜索提醒、用药、检查、宣教（回车直达）" />
          <button class="search-dock__go" data-action="submit-quick-search" aria-label="执行搜索">搜索</button>
        </div>
      </div>

      <main class="pages" id="pages">
        <section class="page active" data-page="home" aria-label="首页"></section>
        <section class="page" data-page="data" aria-label="数据"></section>
        <section class="page" data-page="education" aria-label="宣教"></section>
        <section class="page" data-page="followup" aria-label="随访"></section>
        <section class="page" data-page="reminders" aria-label="提醒"></section>
        <section class="page" data-page="symptoms" aria-label="症状"></section>
        <section class="page" data-page="medication" aria-label="用药"></section>
        <section class="page" data-page="profile" aria-label="我的"></section>
      </main>

      <nav class="tabs" aria-label="底部导航">
        <button class="tab active" data-nav="home" aria-current="page">
          <span class="tab__icon" aria-hidden="true">
            <svg class="tab-svg" viewBox="0 0 24 24" fill="none">
              <path d="M3 10.5L12 3l9 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6.5 10.5V20a1.5 1.5 0 0 0 1.5 1.5h8A1.5 1.5 0 0 0 17.5 20v-9.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="tab__label">首页</span>
        </button>
        <button class="tab" data-nav="data">
          <span class="tab__icon" aria-hidden="true">
            <svg class="tab-svg" viewBox="0 0 24 24" fill="none">
              <path d="M5 20V11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M12 20V7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M19 20V14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M4 20h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="tab__label">数据</span>
        </button>
        <button class="tab" data-nav="education">
          <span class="tab__icon" aria-hidden="true">
            <svg class="tab-svg" viewBox="0 0 24 24" fill="none">
              <rect x="4" y="5" width="16" height="14" rx="2" stroke="currentColor" stroke-width="2"/>
              <path d="M10 9.5v5l4-2.5-4-2.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="tab__label">宣教</span>
        </button>
        <button class="tab" data-nav="followup">
          <span class="tab__icon" aria-hidden="true">
            <svg class="tab-svg" viewBox="0 0 24 24" fill="none">
              <path d="M12 4v16M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <rect x="3" y="3" width="18" height="18" rx="4" stroke="currentColor" stroke-width="2"/>
            </svg>
          </span>
          <span class="tab__label">随访</span>
        </button>
        <button class="tab" data-nav="profile">
          <span class="tab__icon" aria-hidden="true">
            <svg class="tab-svg" viewBox="0 0 24 24" fill="none">
              <path d="M12 12a4.2 4.2 0 1 0-4.2-4.2A4.2 4.2 0 0 0 12 12Z" stroke="currentColor" stroke-width="2"/>
              <path d="M4.5 20a7.5 7.5 0 0 1 15 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="tab__label">我的</span>
        </button>
      </nav>
    </div>

    <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>

    <div class="sheet" id="sheet" aria-hidden="true">
      <div class="sheet__backdrop" data-close="sheet"></div>
      <div class="sheet__panel" id="sheetPanel"></div>
    </div>

    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal__backdrop" data-close="modal"></div>
      <div class="modal__panel" id="modalPanel"></div>
    </div>

    <div class="global-search" id="globalSearch" aria-hidden="true">
      <div class="global-search__backdrop" data-close="global-search"></div>
      <div class="global-search__panel">
        <div class="global-search__head">
          <input id="globalSearchInput" class="global-search__input" type="text" placeholder="搜索提醒、用药、检查、设备..." />
          <button class="global-search__cancel" data-close="global-search">取消</button>
        </div>
        <div class="global-search__meta" id="globalSearchMeta">输入关键词开始搜索</div>
        <div class="global-search__section" id="globalSearchRecent"></div>
        <div class="global-search__section" id="globalSearchResults"></div>
      </div>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
